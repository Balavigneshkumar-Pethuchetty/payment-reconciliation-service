services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    # No host port binding — society_postgres already uses host:5432.
    # API container reaches this via service name "db:5432" inside the compose network.
    # Use "make shell-db" for a psql prompt.
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment for NVIDIA GPU support in WSL2 (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # One-shot container: pulls the model into the shared ollama_data volume on first run.
  # Exits immediately after — Docker won't restart it (restart: "no").
  ollama-init:
    image: ollama/ollama:latest
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL}"]
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama

  ollama-chat:
    build: ./ollama_chat
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434   # docker-internal — not from .env
      OLLAMA_MODEL:    ${OLLAMA_MODEL}
      # Conversations stored in the shared PostgreSQL instance
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # Keycloak auth — uses same server as main API, different realm
      KEYCLOAK_URL:          ${KEYCLOAK_URL}
      KEYCLOAK_REALM:        ollama-chat
      KEYCLOAK_CLIENT_ID:    ollama-chat-app
      # Internal URL bypasses Cloudflare for server-side JWKS fetch
      KEYCLOAK_INTERNAL_URL: http://host.containers.internal:8180
      APP_PUBLIC_URL:        https://chat.gm-global-techies-town.club
      # When set, Claude API is used instead of Ollama for all chat requests
      ANTHROPIC_API_KEY:     ${ANTHROPIC_API_KEY:-}
    depends_on:
      ollama:
        condition: service_healthy
      db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8001:8000"
    # Override Dockerfile CMD: only watch app/ so .venv pip installs don't trigger infinite restarts
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app
    environment:
      # DB — constructed from individual vars so the docker service name "db" is used, not localhost
      DATABASE_URL:      postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SERVICE_BASE_URL:  ${SERVICE_BASE_URL}
      CORS_ORIGINS:      ${CORS_ORIGINS}
      SECRET_KEY:        ${SECRET_KEY}
      # Ollama — docker-internal address, not the .env OLLAMA_BASE_URL (which points to localhost)
      OLLAMA_BASE_URL:      http://ollama:11434
      OLLAMA_MODEL:         ${OLLAMA_MODEL}
      OLLAMA_VISION_MODEL:  ${OLLAMA_VISION_MODEL}
      # Admin
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # UPI
      UPI_VPA:          ${UPI_VPA}
      UPI_DISPLAY_NAME: ${UPI_DISPLAY_NAME}
      # Hyperswitch
      HYPERSWITCH_BASE_URL: ${HYPERSWITCH_BASE_URL}
      HYPERSWITCH_API_KEY:  ${HYPERSWITCH_API_KEY}
      # Keycloak (optional)
      KEYCLOAK_URL:             ${KEYCLOAK_URL}
      KEYCLOAK_REALM:           ${KEYCLOAK_REALM}
      KEYCLOAK_AUDIENCE:        ${KEYCLOAK_AUDIENCE}
      KEYCLOAK_LOGIN_CLIENT_ID: ${KEYCLOAK_LOGIN_CLIENT_ID}
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pg_data:
  ollama_data:
  pgadmin_data:
